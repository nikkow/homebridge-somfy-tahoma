<div class="container-fluid px-0">
  <div class="card shadow-sm border-0">
    <div class="card-body">
      <h3 class="mb-3" id="wizard-title"></h3>
      <p class="text-muted mb-4" id="wizard-subtitle"></p>

      <div class="mb-4 wizard-stepper" id="steps-wrapper">
        <div class="wizard-stepper-track">
          <div class="wizard-stepper-progress" id="steps-progress"></div>
        </div>
        <div class="wizard-stepper-items" id="steps-indicator" role="list"></div>
      </div>

      <section data-step="1" class="wizard-step">
        <h5 id="step1-title"></h5>
        <p id="step1-text1"></p>
        <ol>
          <li id="step1-item1"></li>
          <li id="step1-item2"></li>
          <li id="step1-item3"></li>
        </ol>
        <a href="https://github.com/Somfy-Developer/Somfy-TaHoma-Developer-Mode" target="_blank" rel="noopener" id="step1-link"></a>
      </section>

      <section data-step="2" class="wizard-step d-none">
        <h5 id="step2-title"></h5>
        <p id="step2-text"></p>

        <div class="d-flex gap-2 flex-wrap mb-3">
          <button class="btn btn-primary" id="discover-button" type="button"></button>
          <span class="text-muted align-self-center" id="discover-status"></span>
        </div>

        <div class="mb-2">
          <label class="form-label" for="gateway-select" id="gateway-select-label"></label>
          <select class="form-select" id="gateway-select"></select>
          <div class="form-text" id="gateway-select-help"></div>
        </div>

        <div class="mb-2" id="manual-host-wrapper">
          <label class="form-label" for="host-input" id="host-label"></label>
          <input class="form-control" id="host-input" type="text" placeholder="192.168.1.100" />
          <div class="form-text" id="host-help"></div>
        </div>
      </section>

      <section data-step="3" class="wizard-step d-none">
        <h5 id="step3-title"></h5>
        <p id="step3-text1"></p>
        <ol>
          <li id="step3-item1"></li>
          <li id="step3-item2"></li>
          <li id="step3-item3"></li>
        </ol>

        <div class="mb-2">
          <label class="form-label" for="token-input" id="token-label"></label>
          <input class="form-control" id="token-input" type="text" autocomplete="off" />
        </div>
      </section>

      <section data-step="4" class="wizard-step d-none">
        <h5 id="step4-title"></h5>
        <p id="step4-text"></p>

        <div class="d-flex gap-2 flex-wrap mb-3">
          <button class="btn btn-primary" id="validate-button" type="button"></button>
          <span class="text-muted align-self-center" id="validate-status"></span>
        </div>

        <div id="validation-result"></div>
      </section>

      <section data-step="5" class="wizard-step d-none">
        <h5 id="step5-title"></h5>
        <p id="step5-text"></p>
        <div class="mb-4">
          <h6 id="advanced-title"></h6>
          <div class="mb-2">
            <label class="form-label" for="poll-interval-input" id="poll-interval-label"></label>
            <input class="form-control" id="poll-interval-input" type="number" min="1" max="60" step="1" />
            <div class="form-text" id="poll-interval-help"></div>
          </div>
        </div>
        <h6 id="ignore-list-title"></h6>
        <div id="ignore-list"></div>
      </section>

      <div class="d-flex justify-content-between mt-4">
        <button class="btn btn-outline-secondary" id="prev-button" type="button"></button>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" id="next-button" type="button"></button>
          <button class="btn btn-success d-none" id="save-button" type="button"></button>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .wizard-stepper {
    --stepper-side-offset: 10%;
    --stepper-top-padding: 8px;
    --stepper-items-top-padding: 2px;
    --stepper-marker-size: 32px;
    position: relative;
    padding-top: var(--stepper-top-padding);
  }

  .wizard-stepper-track {
    position: absolute;
    top: calc(var(--stepper-top-padding) + var(--stepper-items-top-padding) + (var(--stepper-marker-size) / 2));
    left: var(--stepper-side-offset);
    right: var(--stepper-side-offset);
    height: 2px;
    background-color: var(--bs-border-color);
    z-index: 0;
  }

  .wizard-stepper-progress {
    height: 100%;
    width: 0;
    background-color: var(--bs-primary);
    transition: width 0.2s ease;
  }

  .wizard-stepper-items {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: nowrap;
    align-items: flex-start;
    gap: 0;
    padding-top: var(--stepper-items-top-padding);
    overflow: visible;
  }

  .stepper-item {
    flex: 1 1 0;
    min-width: 0;
    padding: 0 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .stepper-marker {
    width: var(--stepper-marker-size);
    height: var(--stepper-marker-size);
    border-radius: 50%;
    border: 2px solid var(--bs-border-color);
    background-color: var(--bs-body-bg);
    color: var(--bs-secondary-color);
    font-size: 0.85rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }

  .stepper-label {
    width: 100%;
    font-size: 0.75rem;
    line-height: 1.2;
    text-align: center;
    color: var(--bs-secondary-color);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stepper-item.is-active .stepper-marker {
    border-color: var(--bs-primary);
    color: var(--bs-primary);
    box-shadow: 0 0 0 3px rgba(var(--bs-primary-rgb), 0.2);
  }

  .stepper-item.is-active .stepper-label {
    color: var(--bs-body-color);
    font-weight: 600;
  }

  .stepper-item.is-complete .stepper-marker {
    border-color: var(--bs-primary);
    background-color: var(--bs-primary);
    color: #fff;
  }

  .stepper-item.is-complete .stepper-label {
    color: var(--bs-body-color);
  }

  .wizard-step {
    min-height: 240px;
  }

  .device-card {
    border: 1px solid var(--bs-border-color);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
  }

  .ignore-device-card {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .ignore-device-checkbox {
    margin-top: 2px;
    flex: 0 0 auto;
  }

  .ignore-device-label {
    margin: 0;
    min-width: 0;
    cursor: pointer;
  }
</style>

<script>
(() => {
  const POLL_INTERVAL_MIN_SECONDS = 1;
  const POLL_INTERVAL_MAX_SECONDS = 60;
  const POLL_INTERVAL_DEFAULT_SECONDS = 3;

  const I18N = {
    en: {
      wizardTitle: 'Somfy TaHoma Setup Wizard',
      wizardSubtitle: 'Discover your gateway, verify token access, and select which devices to expose in HomeKit.',

      invalidPollInterval: 'Polling delay must be an integer between 1 and 60 seconds.',

      needToken: 'Please provide a token before continuing.',

      saveSuccessTitle: 'Configuration saved',
      saveSuccessMessage: 'TaHoma configuration saved. Restart Homebridge if required.',
      saveErrorPrefix: 'Save failed:',
      discoveredGatewayLabel: 'Gateway',
      pinLabel: 'PIN',

      includeLabel: 'Include in HomeKit',
      unsupportedReason: 'Reason',
    },
    fr: {
      wizardTitle: 'Assistant de configuration Somfy TaHoma',
      wizardSubtitle: 'Découvrez votre box, validez le token local, puis choisissez les appareils à exposer dans HomeKit.',
      stepTitle: ['1. Mode développeur', '2. Découverte box', '3. Token', '4. Validation connexion', '5. Options avancées'],
      step1Title: 'Activer le mode développeur',
      step1Text1: 'Le mode développeur doit être actif sur votre box TaHoma pour utiliser l\'API locale.',
      step1Item1: 'Ouvrez l\'application mobile TaHoma by Somfy.',
      step1Item2: 'Allez dans les paramètres de la box.',
      step1Item3: 'Touchez 7 fois le PIN de la box pour activer le mode développeur.',
      step1Link: 'Ouvrir le guide officiel TaHoma Developer Mode (GitHub)',
      step2Title: 'Découverte via mDNS (_kizboxdev._tcp)',
      step2Text: 'La découverte conserve les services dont le type commence par "kizbox". Si besoin, saisissez l\'hôte/IP manuellement.',
      discoverButton: 'Découvrir les box',
      discoverIdle: '',
      discoverRunning: 'Découverte en cours...',
      discoverNone: 'Aucune box trouvée. Utilisez la saisie manuelle hôte/IP.',
      discoverFound: 'Découverte terminée.',
      gatewaySelectLabel: 'Box découverte',
      gatewaySelectHelp: 'Sélectionnez une box détectée, ou choisissez la saisie manuelle.',
      gatewaySelectPlaceholder: 'Sélectionner une box découverte',
      gatewaySelectManualOption: 'Autre IP / saisie manuelle',
      hostLabel: 'Hôte / IP de la box',
      hostHelp: 'Vous pouvez saisir un hostname ou une IP. Le port 8443 est utilisé par défaut.',
      step3Title: 'Coller le token développeur',
      step3Text1: 'Générez le token dans le menu Developer Mode de l\'app TaHoma, puis collez-le ici.',
      step3Item1: 'Ouvrez Developer Mode dans l\'application.',
      step3Item2: 'Générez un nouveau token.',
      step3Item3: 'Copiez-le immédiatement (visible uniquement à la création).',
      tokenLabel: 'Token développeur',
      step4Title: 'Valider l\'accès API locale',
      step4Text: 'La validation appelle GET /setup/devices en HTTPS avec CA Somfy stricte.',
      validateButton: 'Valider & charger les appareils',
      validateIdle: '',
      validateRunning: 'Validation en cours...',
      validateSuccess: 'Validation réussie.',
      validateErrorPrefix: 'Échec validation :',
      supportedTitle: 'Appareils supportés (v1)',
      unsupportedTitle: 'Appareils non supportés (ignorés)',
      kindGarage: 'Porte de garage',
      kindRoller: 'Volet roulant',
      step5Title: 'Options avancées',
      step5Text: 'Configurez le polling et choisissez les appareils à ignorer dans HomeKit.',
      advancedTitle: 'Polling',
      pollIntervalLabel: 'Délai de polling (secondes)',
      pollIntervalHelp: 'Entier entre 1 et 60. Valeur par défaut : 3 secondes.',
      invalidPollInterval: 'Le délai de polling doit être un entier entre 1 et 60 secondes.',
      ignoreListTitle: 'Appareils ignorés',
      noSupported: 'Aucun appareil supporté détecté.',
      previous: 'Précédent',
      next: 'Suivant',
      save: 'Enregistrer la configuration',
      needHost: 'Veuillez renseigner un hôte/IP avant de continuer.',
      needToken: 'Veuillez renseigner un token avant de continuer.',
      needValidation: 'Veuillez valider la connexion avant de continuer.',
      saveSuccessTitle: 'Configuration enregistrée',
      saveSuccessMessage: 'Configuration TaHoma enregistrée. Redémarrez Homebridge si nécessaire.',
      saveErrorPrefix: 'Échec enregistrement :',
      discoveredGatewayLabel: 'Box',
      pinLabel: 'PIN',
      apiLabel: 'API',
      firmwareLabel: 'Firmware',
      includeLabel: 'Inclure dans HomeKit',
      unsupportedReason: 'Raison',
    },
  };

  const state = {
    lang: 'en',
    step: 1,
    pluginAlias: 'SomfyTaHoma',
    configBlock: null,
    discovered: [],
    host: '',
    token: '',
    pollIntervalSeconds: POLL_INTERVAL_DEFAULT_SECONDS,
    validated: false,
    validationResult: null,
    ignoredDeviceUrls: new Set(),
  };

  const el = {
    title: document.getElementById('wizard-title'),
    subtitle: document.getElementById('wizard-subtitle'),
    stepperWrapper: document.getElementById('steps-wrapper'),
    stepProgress: document.getElementById('steps-progress'),
    stepIndicator: document.getElementById('steps-indicator'),
    gatewaySelect: document.getElementById('gateway-select'),
    manualHostWrapper: document.getElementById('manual-host-wrapper'),
    hostInput: document.getElementById('host-input'),
    tokenInput: document.getElementById('token-input'),
    pollIntervalInput: document.getElementById('poll-interval-input'),
    discoverButton: document.getElementById('discover-button'),
    discoverStatus: document.getElementById('discover-status'),
    validateButton: document.getElementById('validate-button'),
    validateStatus: document.getElementById('validate-status'),
    validationResult: document.getElementById('validation-result'),
    ignoreList: document.getElementById('ignore-list'),
    prevButton: document.getElementById('prev-button'),
    nextButton: document.getElementById('next-button'),
    saveButton: document.getElementById('save-button'),
  };

  function t(key) {
    const dict = I18N[state.lang] || I18N.en;
    return dict[key] ?? key;
  }

  function kindLabel(kind) {
    if (kind === 'garageDoor') {
      return t('kindGarage');
    }

    if (kind === 'rollerShutter') {
      return t('kindRoller');
    }

    return kind;
  }

  function setText(id, value) {
    const node = document.getElementById(id);
    if (node) {
      node.textContent = value;
    }
  }

  function setLocalizedTexts() {
    el.title.textContent = t('wizardTitle');
    el.subtitle.textContent = t('wizardSubtitle');

    setText('step1-title', t('step1Title'));
    setText('step1-text1', t('step1Text1'));
    setText('step1-item1', t('step1Item1'));
    setText('step1-item2', t('step1Item2'));
    setText('step1-item3', t('step1Item3'));
    setText('step1-link', t('step1Link'));

    setText('step2-title', t('step2Title'));
    setText('step2-text', t('step2Text'));
    setText('gateway-select-label', t('gatewaySelectLabel'));
    setText('gateway-select-help', t('gatewaySelectHelp'));
    setText('host-label', t('hostLabel'));
    setText('host-help', t('hostHelp'));

    setText('step3-title', t('step3Title'));
    setText('step3-text1', t('step3Text1'));
    setText('step3-item1', t('step3Item1'));
    setText('step3-item2', t('step3Item2'));
    setText('step3-item3', t('step3Item3'));
    setText('token-label', t('tokenLabel'));

    setText('step4-title', t('step4Title'));
    setText('step4-text', t('step4Text'));

    setText('step5-title', t('step5Title'));
    setText('step5-text', t('step5Text'));
    setText('advanced-title', t('advancedTitle'));
    setText('poll-interval-label', t('pollIntervalLabel'));
    setText('poll-interval-help', t('pollIntervalHelp'));
    setText('ignore-list-title', t('ignoreListTitle'));

    el.discoverButton.textContent = t('discoverButton');
    el.validateButton.textContent = t('validateButton');
    el.prevButton.textContent = t('previous');
    el.nextButton.textContent = t('next');
    el.saveButton.textContent = t('save');

    renderStepIndicator();
  }

  function renderStepIndicator() {
    el.stepIndicator.innerHTML = '';

    const labels = I18N[state.lang].stepTitle;
    const totalSteps = labels.length;
    const progress = totalSteps > 1
      ? ((state.step - 1) / (totalSteps - 1)) * 100
      : 0;

    if (el.stepperWrapper) {
      const sideOffset = totalSteps > 0 ? 50 / totalSteps : 0;
      el.stepperWrapper.style.setProperty('--stepper-side-offset', `${sideOffset}%`);
    }

    if (el.stepProgress) {
      el.stepProgress.style.width = `${progress}%`;
    }

    labels.forEach((label, index) => {
      const stepNumber = index + 1;
      const cleanLabel = label.replace(/^\d+\.\s*/, '');
      const item = document.createElement('div');
      item.className = 'stepper-item';
      item.setAttribute('role', 'listitem');

      if (stepNumber < state.step) {
        item.classList.add('is-complete');
      }

      if (stepNumber === state.step) {
        item.classList.add('is-active');
      }

      const marker = document.createElement('span');
      marker.className = 'stepper-marker';
      marker.textContent = String(stepNumber);
      marker.setAttribute('aria-hidden', 'true');

      const text = document.createElement('span');
      text.className = 'stepper-label';
      text.textContent = cleanLabel;
      text.title = label;

      item.appendChild(marker);
      item.appendChild(text);
      el.stepIndicator.appendChild(item);
    });
  }

  function renderVisibleStep() {
    const sections = document.querySelectorAll('.wizard-step');
    sections.forEach((section) => {
      const sectionStep = Number(section.dataset.step);
      section.classList.toggle('d-none', sectionStep !== state.step);
    });

    el.prevButton.disabled = state.step === 1;
    el.nextButton.classList.toggle('d-none', state.step === 5);
    el.saveButton.classList.toggle('d-none', state.step !== 5);
    renderStepIndicator();
  }

  function setHost(value) {
    state.host = value.trim();
    el.hostInput.value = state.host;
  }

  function setToken(value) {
    state.token = value.trim();
    el.tokenInput.value = state.token;
  }

  function setPollIntervalSeconds(value) {
    state.pollIntervalSeconds = value;
    el.pollIntervalInput.value = String(value);
  }

  function parsePollIntervalSeconds(rawValue) {
    const normalized = String(rawValue ?? '').trim();

    if (!normalized) {
      return null;
    }

    const parsed = Number(normalized);
    const isValid = Number.isInteger(parsed)
      && parsed >= POLL_INTERVAL_MIN_SECONDS
      && parsed <= POLL_INTERVAL_MAX_SECONDS;

    return isValid ? parsed : null;
  }

  function toGatewayHostValue(gateway) {
    return gateway.port && gateway.port !== 8443
      ? `${gateway.host}:${gateway.port}`
      : gateway.host;
  }

  function updateManualHostVisibility() {
    const selected = el.gatewaySelect.value;
    const showManualHost = !state.discovered.length || selected === '__manual__' || selected === '';

    el.manualHostWrapper.classList.toggle('d-none', !showManualHost);
  }

  function renderGatewaySelect() {
    el.gatewaySelect.innerHTML = '';

    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = t('gatewaySelectPlaceholder');
    el.gatewaySelect.appendChild(placeholder);

    let matchedCurrentHost = false;

    state.discovered.forEach((gateway) => {
      const hostWithPort = toGatewayHostValue(gateway);
      const option = document.createElement('option');
      option.value = hostWithPort;
      option.textContent = `${gateway.name} (${hostWithPort})`;

      if (state.host && state.host === hostWithPort) {
        option.selected = true;
        matchedCurrentHost = true;
      }

      el.gatewaySelect.appendChild(option);
    });

    const manualOption = document.createElement('option');
    manualOption.value = '__manual__';
    manualOption.textContent = t('gatewaySelectManualOption');
    el.gatewaySelect.appendChild(manualOption);

    if (!state.discovered.length || (state.host && !matchedCurrentHost)) {
      el.gatewaySelect.value = '__manual__';
    } else if (!state.host) {
      el.gatewaySelect.value = '';
    }

    updateManualHostVisibility();
  }

  function renderValidationResult() {
    el.validationResult.innerHTML = '';

    if (!state.validationResult) {
      return;
    }

    const supported = state.validationResult.supportedDevices || [];
    const unsupported = state.validationResult.unsupportedDevices || [];

    const root = document.createElement('div');

    const supportedBlock = document.createElement('div');
    supportedBlock.className = 'mb-3';
    supportedBlock.innerHTML = `<h6>${t('supportedTitle')} (${supported.length})</h6>`;

    if (supported.length > 0) {
      supported.forEach((device) => {
        const card = document.createElement('div');
        card.className = 'device-card';
        card.innerHTML = `
          <strong>${device.label}</strong><br>
          <small class="text-muted">${kindLabel(device.kind)} | ${device.controllableName} | ${device.deviceURL}</small>
        `;
        supportedBlock.appendChild(card);
      });
    } else {
      const empty = document.createElement('div');
      empty.className = 'text-muted';
      empty.textContent = t('noSupported');
      supportedBlock.appendChild(empty);
    }

    const unsupportedBlock = document.createElement('div');
    unsupportedBlock.className = 'mb-2';
    unsupportedBlock.innerHTML = `<h6>${t('unsupportedTitle')} (${unsupported.length})</h6>`;

    unsupported.forEach((device) => {
      const card = document.createElement('div');
      card.className = 'device-card';
      card.innerHTML = `
        <strong>${device.label}</strong><br>
        <small class="text-muted">${device.controllableName} | ${device.deviceURL}</small><br>
        <small class="text-danger">${t('unsupportedReason')}: ${device.reason}</small>
      `;
      unsupportedBlock.appendChild(card);
    });

    root.appendChild(supportedBlock);
    root.appendChild(unsupportedBlock);

    el.validationResult.appendChild(root);
  }

  function renderIgnoreList() {
    el.ignoreList.innerHTML = '';

    const supported = state.validationResult?.supportedDevices || [];

    if (supported.length > 0) {
      supported.forEach((device, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'device-card ignore-device-card';

        const checkboxId = `ignore-device-${index}`;
        const isIgnored = state.ignoredDeviceUrls.has(device.deviceURL);

        wrapper.innerHTML = `
          <input class="form-check-input ignore-device-checkbox" type="checkbox" id="${checkboxId}" ${isIgnored ? 'checked' : ''}>
          <label class="form-check-label ignore-device-label" for="${checkboxId}">
            <strong>${device.label}</strong><br>
            <small class="text-muted">${kindLabel(device.kind)} | ${device.controllableName}</small><br>
            <small class="text-muted">${device.deviceURL}</small>
          </label>
        `;

        wrapper.querySelector('input').addEventListener('change', (event) => {
          const checked = event.target.checked;

          if (checked) {
            state.ignoredDeviceUrls.add(device.deviceURL);
          } else {
            state.ignoredDeviceUrls.delete(device.deviceURL);
          }
        });

        el.ignoreList.appendChild(wrapper);
      });
      return;
    }

    el.ignoreList.innerHTML = `<div class="text-muted">${t('noSupported')}</div>`;
  }

  async function discoverGateways() {
    el.discoverStatus.textContent = t('discoverRunning');
    el.discoverButton.disabled = true;

    try {
      const gateways = await homebridge.request('/discover', { timeoutMs: 3000 });
      state.discovered = Array.isArray(gateways) ? gateways : [];

      if (state.discovered.length === 0) {
        el.discoverStatus.textContent = t('discoverNone');
      } else {
        el.discoverStatus.textContent = t('discoverFound');

        if (!state.host) {
          const first = state.discovered[0];
          const hostWithPort = toGatewayHostValue(first);
          setHost(hostWithPort);
        }
      }

      renderGatewaySelect();
    } catch (error) {
      el.discoverStatus.textContent = `${t('validateErrorPrefix')} ${(error && error.message) ? error.message : String(error)}`;
    } finally {
      el.discoverButton.disabled = false;
    }
  }

  async function validateConnection() {
    if (!state.host) {
      homebridge.toast.warning(t('needHost'));
      return;
    }

    if (!state.token) {
      homebridge.toast.warning(t('needToken'));
      return;
    }

    el.validateStatus.textContent = t('validateRunning');
    el.validateButton.disabled = true;

    try {
      state.validationResult = await homebridge.request('/validate', {
        host: state.host,
        token: state.token,
      });
      state.validated = true;
      el.validateStatus.textContent = t('validateSuccess');

      const supportedDeviceUrls = new Set((state.validationResult.supportedDevices || []).map((device) => device.deviceURL));
      state.ignoredDeviceUrls = new Set([...state.ignoredDeviceUrls].filter((deviceURL) => supportedDeviceUrls.has(deviceURL)));

      renderValidationResult();
      renderIgnoreList();
    } catch (error) {
      state.validated = false;
      state.validationResult = null;
      renderValidationResult();
      renderIgnoreList();
      el.validateStatus.textContent = `${t('validateErrorPrefix')} ${(error && error.message) ? error.message : String(error)}`;
    } finally {
      el.validateButton.disabled = false;
    }
  }

  function handleNext() {
    if (state.step === 2 && !state.host) {
      homebridge.toast.warning(t('needHost'));
      return;
    }

    if (state.step === 3 && !state.token) {
      homebridge.toast.warning(t('needToken'));
      return;
    }

    if (state.step === 4 && !state.validated) {
      homebridge.toast.warning(t('needValidation'));
      return;
    }

    state.step = Math.min(5, state.step + 1);
    renderVisibleStep();
  }

  function handlePrevious() {
    state.step = Math.max(1, state.step - 1);
    renderVisibleStep();
  }

  async function saveConfiguration() {
    if (!state.validated) {
      homebridge.toast.warning(t('needValidation'));
      return;
    }

    const pollIntervalSeconds = parsePollIntervalSeconds(el.pollIntervalInput.value);

    if (pollIntervalSeconds === null) {
      homebridge.toast.warning(t('invalidPollInterval'));
      return;
    }

    state.pollIntervalSeconds = pollIntervalSeconds;

    const base = state.configBlock || {
      platform: state.pluginAlias,
      name: 'Somfy TaHoma',
    };

    const updated = {
      ...base,
      platform: state.pluginAlias,
      ip: state.host,
      token: state.token,
      pollIntervalSeconds: state.pollIntervalSeconds,
      ignoredDeviceUrls: [...state.ignoredDeviceUrls],
    };

    try {
      await homebridge.updatePluginConfig([updated]);
      await homebridge.savePluginConfig();
      homebridge.toast.success(t('saveSuccessMessage'), t('saveSuccessTitle'));
    } catch (error) {
      homebridge.toast.error(`${t('saveErrorPrefix')} ${(error && error.message) ? error.message : String(error)}`);
    }
  }

  async function loadInitialConfig() {
    const lang = await homebridge.i18nCurrentLang();
    state.lang = lang && lang.toLowerCase().startsWith('fr') ? 'fr' : 'en';

    const schema = await homebridge.getPluginConfigSchema();
    state.pluginAlias = schema?.pluginAlias || 'SomfyTaHoma';

    const blocks = await homebridge.getPluginConfig();
    const matching = Array.isArray(blocks)
      ? blocks.find((block) => block.platform === state.pluginAlias || block.platform === `${homebridge.plugin?.name}.${state.pluginAlias}`)
      : null;

    if (matching) {
      state.configBlock = matching;
      setHost(typeof matching.ip === 'string' ? matching.ip : '');
      setToken(typeof matching.token === 'string' ? matching.token : '');
      const configuredPollInterval = parsePollIntervalSeconds(matching.pollIntervalSeconds);

      if (configuredPollInterval !== null) {
        setPollIntervalSeconds(configuredPollInterval);
      }

      if (Array.isArray(matching.ignoredDeviceUrls)) {
        state.ignoredDeviceUrls = new Set(matching.ignoredDeviceUrls.filter((value) => typeof value === 'string'));
      }
    }
  }

  async function bootstrap() {
    homebridge.hideSchemaForm();

    await loadInitialConfig();
    setLocalizedTexts();

    el.hostInput.value = state.host;
    el.tokenInput.value = state.token;
    el.pollIntervalInput.value = String(state.pollIntervalSeconds);

    el.discoverStatus.textContent = t('discoverIdle');
    el.validateStatus.textContent = t('validateIdle');

    renderGatewaySelect();
    renderValidationResult();
    renderIgnoreList();
    renderVisibleStep();

    el.gatewaySelect.addEventListener('change', (event) => {
      const selected = event.target.value;

      if (selected && selected !== '__manual__') {
        setHost(selected);
      }

      if (!selected) {
        setHost('');
      }

      state.validated = false;
      updateManualHostVisibility();
    });

    el.hostInput.addEventListener('input', (event) => {
      setHost(event.target.value);
      state.validated = false;
    });

    el.tokenInput.addEventListener('input', (event) => {
      setToken(event.target.value);
      state.validated = false;
    });

    el.pollIntervalInput.addEventListener('input', (event) => {
      const pollIntervalSeconds = parsePollIntervalSeconds(event.target.value);

      if (pollIntervalSeconds !== null) {
        state.pollIntervalSeconds = pollIntervalSeconds;
      }
    });

    el.discoverButton.addEventListener('click', discoverGateways);
    el.validateButton.addEventListener('click', validateConnection);
    el.nextButton.addEventListener('click', handleNext);
    el.prevButton.addEventListener('click', handlePrevious);
    el.saveButton.addEventListener('click', saveConfiguration);
  }

  homebridge.addEventListener('ready', () => {
    bootstrap().catch((error) => {
      homebridge.toast.error(String(error));
    });
  });
})();
</script>
